services:
  app:
    build: ./app
    container_name: calendario_app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-calendario_db}
      DB_USER: ${MYSQL_USER:-calendario_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-calendario_pass}
    depends_on:
      - db
    networks:
      - calendario_net

  db:
    image: mysql:8.4
    container_name: calendario_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-calendario_db}
      MYSQL_USER: ${MYSQL_USER:-calendario_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-calendario_pass}
    volumes:
      - calendario_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - calendario_net

volumes:
  calendario_data:

networks:
  calendario_net:
    driver: bridge
